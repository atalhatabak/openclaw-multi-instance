{% extends "base.html" %}

{% block title %}Oturum Hazirlaniyor | OpenClaw{% endblock %}

{% block body %}
  <main class="launch-shell">
    <section class="panel launch-panel">
      <p class="eyebrow">Oturum</p>
      <h1>{{ username }} hazirlaniyor</h1>
      <p class="muted">Dashboard yeni sekmede aciliyor.</p>
      <div class="hero-note">
        Container: <span class="mono">{{ container_name }}</span>
      </div>
      <p class="muted">
        Yeni sekme acilmazsa <a class="text-link" href="{{ gateway_url }}" target="_blank" rel="noopener">manuel ac</a>.
      </p>
    </section>
  </main>

  <script>
    window.addEventListener("load", () => {
      try {
        window.open({{ gateway_url|tojson }}, "openclaw-dashboard");
      } catch (err) {
      }
      window.location.replace({{ profile_url|tojson }});
    });
  </script>
{% endblock %}
